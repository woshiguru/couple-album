        <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">›</button>
    </div>

    <!-- 编辑弹窗 -->
    <div class="edit-modal" id="editModal">
        <div class="edit-content">
            <h3>📝 编辑照片信息</h3>
            <div class="form-group">
                <label>描述</label>
                <textarea id="editDescription" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>标签（用逗号分隔）</label>
                <input type="text" id="editTags" placeholder="旅行, 景点, 美食">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="savePhotoEdit()">保存</button>
                <button class="btn btn-danger" onclick="closeEditModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 收藏夹管理弹窗 -->
    <div class="manage-modal" id="manageModal">
        <div class="manage-content">
            <h3>⚙️ 管理收藏夹</h3>
            <div id="manageList"></div>
            <div style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                <div class="form-group">
                    <label>新建收藏夹</label>
                    <input type="text" id="newCollectionName" placeholder="输入收藏夹名称">
                </div>
                <button class="btn" onclick="createCollectionFromManage()">创建</button>
            </div>
            <button class="btn" style="background:#999;margin-top:10px;" onclick="closeManageCollections()">关闭</button>
        </div>
    </div>

    <!-- 更新弹窗 -->
    <div class="update-modal" id="updateModal">
        <div class="update-content">
            <h3>📦 发现新版本</h3>
            <div class="update-info" id="updateInfo"></div>
            <div class="update-desc" id="updateDesc" style="display:none;"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" id="updateApplyBtn" onclick="applyUpdate()">立即更新</button>
                <button class="btn" style="background:#999;" onclick="closeUpdateModal()">暂不更新</button>
            </div>
        </div>
    </div>

    <!-- 加入收藏夹弹窗 -->
    <div class="collection-picker-wrap" id="collectionPickerWrap" style="display:none;">
        <div class="collection-picker" id="collectionPicker"></div>
    </div>

    <!-- 音乐播放器 -->
    <div class="music-player" id="musicPlayer">
        <!-- 折叠状态 -->
        <div class="music-player-collapsed" id="musicCollapsed" onclick="expandMusicPlayer()">🎵</div>
        <!-- 展开状态 -->
        <div class="music-player-expanded">
            <div class="music-header">
                <span class="music-header-title">🎵 音乐</span>
                <div class="music-header-btns">
                    <button onclick="toggleMusicLoopMode()" id="loopModeBtn" title="播放模式">🔁</button>
                    <button onclick="collapseMusicPlayer()" title="收起">−</button>
                </div>
            </div>
            <div class="music-now-playing">
                <div class="music-song-name" id="musicSongName">暂无音乐</div>
                <div class="music-song-index" id="musicSongIndex"></div>
            </div>
            <div class="music-progress">
                <div class="music-progress-bar" id="musicProgressBar" onclick="seekMusic(event)">
                    <div class="music-progress-fill" id="musicProgressFill"></div>
                </div>
                <div class="music-time">
                    <span id="musicCurrentTime">0:00</span>
                    <span id="musicDuration">0:00</span>
                </div>
            </div>
            <div class="music-controls">
                <button class="music-ctrl-btn" onclick="prevMusic()" title="上一首">⏮</button>
                <button class="music-play-btn" id="musicPlayBtn" onclick="toggleMusic()">🎵</button>
                <button class="music-ctrl-btn" onclick="nextMusic()" title="下一首">⏭</button>
            </div>
            <div class="music-volume">
                <span class="music-volume-icon" onclick="toggleMute()">🔊</span>
                <div class="music-volume-bar" id="musicVolumeBar" onclick="setVolume(event)">
                    <div class="music-volume-fill" id="musicVolumeFill"></div>
                </div>
            </div>
            <div class="music-playlist" id="musicPlaylist"></div>
        </div>
        <audio id="audioPlayer"></audio>
    </div>

    <script>
        // 全局变量
        let allPhotos = [];
        let allAlbums = [];
        let allMusic = [];
        let allCollections = [];
        let currentAlbum = 'all';
        let currentView = 'all';
        let currentCollection = null; // null = 所有收藏，否则是收藏夹 id
        let currentLightboxIndex = 0;
        let musicFiles = [];
        let currentMusicIndex = 0;
        let musicLoopMode = 'sequence'; // sequence, shuffle, single
        let isMusicPlaying = false;
        let isAdminMode = false;
        let editingPhoto = null;
        let pickerPhoto = null; // 当前正在选择收藏夹的照片
        let currentVersion = '1.0.0';

        // ===== 性能优化：分页和懒加载 =====
        const PAGE_SIZE = 50;
        let displayedCount = 0;
        let filteredPhotos = [];
        let lazyObserver = null;

        // Toast 提示
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // 自定义确认框（返回 Promise）
        function showConfirm(message) {
            return new Promise((resolve) => {
                const dialog = document.getElementById('confirmDialog');
                const msgEl = document.getElementById('confirmMessage');
                const okBtn = document.getElementById('confirmOk');
                const cancelBtn = document.getElementById('confirmCancel');

                msgEl.textContent = message;
                dialog.classList.add('active');

                function cleanup() {
                    dialog.classList.remove('active');
                    okBtn.onclick = null;
                    cancelBtn.onclick = null;
                }

                okBtn.onclick = () => { cleanup(); resolve(true); };
                cancelBtn.onclick = () => { cleanup(); resolve(false); };
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            setupLazyObserver();
            setupEventListeners();
            loadData();
            // 延迟启动特效，减少初始负载
            setTimeout(startEffects, 2000);
        });

        // 懒加载观察器
        function setupLazyObserver() {
            lazyObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const item = entry.target;
                        const mediaSrc = item.dataset.src;
                        const mediaType = item.dataset.type;

                        if (mediaSrc && !item.dataset.loaded) {
                            if (mediaType === 'video') {
                                const video = document.createElement('video');
                                video.src = mediaSrc;
                                video.muted = true;
                                video.preload = 'none';
                                video.poster = item.dataset.poster || '';
                                item.innerHTML = video.outerHTML;
                            } else {
                                const img = document.createElement('img');
                                img.src = mediaSrc;
                                img.alt = item.dataset.alt || '';
                                img.loading = 'lazy';
                                item.innerHTML = img.outerHTML;
                            }
                            item.dataset.loaded = 'true';
                        }
                        lazyObserver.unobserve(item);
                    }
                });
            }, {
                rootMargin: '200px 0px',
                threshold: 0.01
            });
        }

        // 延迟启动特效
        function startEffects() {
            // 背景浮动装饰
            initBgDecor();
            // 只保留鼠标拖尾
            document.addEventListener('mousemove', createMouseTrail);
            // 点击特效
            document.addEventListener('click', createClickEffect);
        }

        // 背景浮动装饰
        function initBgDecor() {
            const container = document.getElementById('bgDecor');
            const symbols = ['🌸', '💗', '✨', '🌷', '💫', '🌹', '🦋', '🌺'];
            const count = 18;
            for (let i = 0; i < count; i++) {
                const span = document.createElement('span');
                span.textContent = symbols[i % symbols.length];
                const size = Math.random() * 20 + 16;
                span.style.fontSize = size + 'px';
                span.style.left = Math.random() * 100 + '%';
                span.style.animationDuration = (Math.random() * 20 + 20) + 's';
                span.style.animationDelay = -(Math.random() * 30) + 's';
                container.appendChild(span);
            }
        }

        // 鼠标拖尾特效
        function createMouseTrail(e) {
            if (Math.random() > 0.15) return;
            const trail = document.createElement('div');
            trail.className = 'trail-particle';
            const trails = ['✨', '💖', '🌸', '⭐'];
            trail.innerHTML = trails[Math.floor(Math.random() * trails.length)];
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
            trail.style.fontSize = (Math.random() * 12 + 10) + 'px';
            trail.style.animation = 'trailFade 1s ease-out forwards';
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 1000);
        }

        // 点击特效
        function createClickEffect(e) {
            // 创建中心爱心
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.style.left = e.clientX + 'px';
            effect.style.top = e.clientY + 'px';
            effect.innerHTML = '💗';
            effect.style.fontSize = '30px';
            effect.style.animation = 'clickRipple 0.6s ease-out forwards';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 600);

            // 创建扩散粒子
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'click-effect';
                    const particles = ['🌸', '✨', '💕', '⭐'];
                    particle.innerHTML = particles[Math.floor(Math.random() * particles.length)];
                    const angle = (i / 6) * Math.PI * 2;
                    const distance = 50;
                    particle.style.left = (e.clientX + Math.cos(angle) * distance) + 'px';
                    particle.style.top = (e.clientY + Math.sin(angle) * distance) + 'px';
                    particle.style.fontSize = '16px';
                    particle.style.animation = 'trailFade 0.8s ease-out forwards';
                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 800);
                }, i * 50);
            }
        }

        // 设置事件监听
        function setupEventListeners() {
            // 导航按钮
            document.querySelectorAll('.nav-btn[data-view]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentView = e.target.dataset.view;
                    currentCollection = null;
                    // 显示/隐藏收藏夹视图区
                    const collectionView = document.getElementById('collectionView');
                    if (currentView === 'favorites') {
                        collectionView.classList.add('active');
                        renderCollectionTabs();
                    } else {
                        collectionView.classList.remove('active');
                    }
                    resetAndRender();
                });
            });

            // 模式切换
            document.getElementById('modeToggle').addEventListener('click', toggleAdminMode);

            // 音乐播放器事件
            setupMusicEvents();

            // 上传区域（使用 pywebview 本地文件对话框）
            document.getElementById('photoUploadArea').addEventListener('click', selectAndUploadPhotos);
            document.getElementById('musicUploadArea').addEventListener('click', selectAndUploadMusic);

            // 键盘事件
            document.addEventListener('keydown', (e) => {
                if (document.getElementById('lightbox').classList.contains('active')) {
                    if (e.key === 'Escape') closeLightbox();
                    if (e.key === 'ArrowLeft') navigateLightbox(-1);
                    if (e.key === 'ArrowRight') navigateLightbox(1);
                }
            });

            // 滚动加载
            window.addEventListener('scroll', checkScrollLoad);
        }

        function checkScrollLoad() {
            const loadMoreContainer = document.getElementById('loadMoreContainer');
            if (loadMoreContainer.style.display === 'none') return;

            const rect = loadMoreContainer.getBoundingClientRect();
            if (rect.top < window.innerHeight + 200) {
                loadMore();
            }
        }

        // 选择并上传照片（Python 弹出原生文件对话框，直接复制到 storage）
        async function selectAndUploadPhotos() {
            const album = document.getElementById('uploadAlbum').value;
            if (!album) { showToast('请先选择相册'); return; }

            if (window.pywebview && window.pywebview.api) {
                try {
                    showToast('正在选择文件...', 'info');
                    const result = await window.pywebview.api.upload_photos(album);
                    if (result.success) {
                        showToast(`成功导入 ${result.uploaded} 个文件`, 'success');
                        loadData();
                    } else if (result.error && result.error !== '未选择文件') {
                        showToast('导入失败: ' + result.error, 'error');
                    }
                } catch (error) {
                    showToast('导入失败: ' + error, 'error');
                }
            } else {
                showToast('仅在桌面应用中支持此功能', 'error');
            }
        }

        // 选择并上传音乐（Python 弹出原生文件对话框，直接复制到 storage）
        async function selectAndUploadMusic() {
            if (window.pywebview && window.pywebview.api) {
                try {
                    showToast('正在选择文件...', 'info');
                    const result = await window.pywebview.api.upload_music();
                    if (result.success) {
                        showToast(`成功导入 ${result.uploaded} 个音乐文件`, 'success');
                        loadData();
                    } else if (result.error && result.error !== '未选择文件') {
                        showToast('导入失败: ' + result.error, 'error');
                    }
                } catch (error) {
                    showToast('导入失败: ' + error, 'error');
                }
            } else {
                showToast('仅在桌面应用中支持此功能', 'error');
            }
        }

        // 扫描同步 - 扫描 storage 文件夹，把手动加入的新文件登记到 metadata
        async function syncFiles() {
            if (window.pywebview && window.pywebview.api) {
                try {
                    showToast('正在扫描...', 'info');
                    const result = await window.pywebview.api.sync_files();
                    if (result.success) {
                        const addParts = [];
                        const delParts = [];
                        if (result.newAlbums > 0) addParts.push(`${result.newAlbums} 个相册`);
                        if (result.newMusic > 0) addParts.push(`${result.newMusic} 个音乐`);
                        if (result.newPhotos > 0) addParts.push(`${result.newPhotos} 张图片`);
                        if (result.newVideos > 0) addParts.push(`${result.newVideos} 个视频`);
                        if (result.deletedAlbums > 0) delParts.push(`${result.deletedAlbums} 个相册`);
                        if (result.deletedMusic > 0) delParts.push(`${result.deletedMusic} 个音乐`);
                        if (result.deletedPhotos > 0) delParts.push(`${result.deletedPhotos} 张图片`);
                        if (result.deletedVideos > 0) delParts.push(`${result.deletedVideos} 个视频`);

                        if (addParts.length === 0 && delParts.length === 0) {
                            showToast('没有变化', 'info');
                        } else {
                            const msgs = [];
                            if (addParts.length > 0) msgs.push('新增：' + addParts.join('、'));
                            if (delParts.length > 0) msgs.push('删除：' + delParts.join('、'));
                            showToast(msgs.join('  |  '), 'success');
                            loadData();
                        }
                    } else {
                        showToast('同步失败: ' + result.error, 'error');
                    }
                } catch (error) {
                    showToast('同步失败: ' + error, 'error');
                }
            } else {
                showToast('仅在桌面应用中支持此功能', 'error');
            }
        }

        // 加载数据
        async function loadData() {
            try {
                const [albumsRes, photosRes, musicRes, statusRes, collectionsRes] = await Promise.all([
                    fetch('/api/albums'),
                    fetch('/api/photos'),
                    fetch('/api/music'),
                    fetch('/api/status'),
                    fetch('/api/collections')
                ]);

                allAlbums = await albumsRes.json();
                allPhotos = await photosRes.json();
                allMusic = await musicRes.json();
                allCollections = await collectionsRes.json();
                const status = await statusRes.json();

                // 应用名称
                applyAppName(status.appName || '情侣相册');
                currentVersion = status.version || '1.0.0';
                document.getElementById('versionBadge').textContent = 'v' + currentVersion;

                // 更新后显示更新内容（只在新版本首次加载时显示）
                const lastSeen = sessionStorage.getItem('lastSeenVersion');
                if (lastSeen && lastSeen !== currentVersion && status.lastUpdateDescription) {
                    showToast('更新成功！' + status.lastUpdateDescription, 'success');
                }
                sessionStorage.setItem('lastSeenVersion', currentVersion);

                renderAlbumSelector();
                renderCollectionTabs();
                resetAndRender();
                updateUploadAlbumSelect();

                if (allMusic.length > 0) {
                    musicFiles = allMusic;
                    updateMusicInfo();
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 重置并渲染
        function resetAndRender() {
            displayedCount = 0;
            document.getElementById('gallery').innerHTML = '';
            filterPhotos();
            renderBatch();
        }

        // 过滤照片
        function filterPhotos() {
            filteredPhotos = [...allPhotos];

            if (currentAlbum !== 'all') {
                filteredPhotos = filteredPhotos.filter(p => p.album === currentAlbum);
            }

            if (currentView === 'favorites') {
                if (currentCollection) {
                    // 显示特定收藏夹的照片
                    const col = allCollections.find(c => c.id === currentCollection);
                    if (col) {
                        filteredPhotos = filteredPhotos.filter(p =>
                            col.photoIds.some(item => item.album === p.album && item.photoId === p.id)
                        );
                    } else {
                        filteredPhotos = [];
                    }
                } else {
                    // 显示所有收藏夹中的所有照片（去重）
                    const favKeys = new Set();
                    allCollections.forEach(col => {
                        col.photoIds.forEach(item => favKeys.add(`${item.album}|||${item.photoId}`));
                    });
                    filteredPhotos = filteredPhotos.filter(p => favKeys.has(`${p.album}|||${p.id}`));
                }
            } else if (currentView === 'timeline') {
                filteredPhotos.sort((a, b) => new Date(b.date) - new Date(a.date));
            }
        }

        // 渲染一批照片
        function renderBatch() {
            const gallery = document.getElementById('gallery');
            const loadMoreContainer = document.getElementById('loadMoreContainer');
            const loadMoreBtn = document.getElementById('loadMoreBtn');

            if (filteredPhotos.length === 0) {
                gallery.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📷</div>
                        <h2>还没有照片</h2>
                        <p>${isAdminMode ? '请上传照片' : '切换到管理模式上传照片'}</p>
                    </div>
                `;
                loadMoreContainer.style.display = 'none';
                return;
            }

            const start = displayedCount;
            const end = Math.min(start + PAGE_SIZE, filteredPhotos.length);
            const batch = filteredPhotos.slice(start, end);

            const fragment = document.createDocumentFragment();

            batch.forEach((photo, batchIndex) => {
                const globalIndex = start + batchIndex;
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.style.animationDelay = (batchIndex * 0.05) + 's';

                const mediaWrapper = document.createElement('div');
                mediaWrapper.className = 'lazy-placeholder';
                // 确保路径有前导斜杠并正确编码中文
                let srcPath = photo.path;
                if (!srcPath.startsWith('/')) srcPath = '/' + srcPath;
                mediaWrapper.dataset.src = encodeURI(srcPath);
                mediaWrapper.dataset.type = photo.type;
                mediaWrapper.dataset.alt = photo.description || '';
                // 视频缩略图
                if (photo.thumbnail) {
                    let thumbPath = photo.thumbnail;
                    if (!thumbPath.startsWith('/')) thumbPath = '/' + thumbPath;
                    mediaWrapper.dataset.poster = encodeURI(thumbPath);
                }
                mediaWrapper.innerHTML = photo.type === 'video' ? '🎬' : '🖼️';

                item.appendChild(mediaWrapper);

                // 加入收藏夹按钮
                const photoCollections = photo.collections || [];
                const collBtn = document.createElement('button');
                collBtn.className = 'favorite-btn' + (photoCollections.length > 0 ? ' favorited' : '');
                collBtn.innerHTML = photoCollections.length > 0 ? '❤️' : '➕';
                collBtn.title = photoCollections.length > 0
                    ? `已在 ${photoCollections.length} 个收藏夹中`
                    : '加入收藏夹';
                collBtn.onclick = (e) => onCollectionBtnClick(e, photo);
                item.appendChild(collBtn);

                // 管理模式按钮
                if (isAdminMode) {
                    const editBtn = document.createElement('button');
                    editBtn.style.cssText = 'position:absolute;top:15px;left:15px;background:#fff;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,0.15);';
                    editBtn.innerHTML = '✏️';
                    editBtn.onclick = () => editPhoto(photo.album, photo.id);
                    item.appendChild(editBtn);

                    const delBtn = document.createElement('button');
                    delBtn.style.cssText = 'position:absolute;bottom:60px;right:15px;background:#e74c3c;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:20px;color:#fff;';
                    delBtn.innerHTML = '🗑️';
                    delBtn.onclick = () => deletePhoto(photo.album, photo.id);
                    item.appendChild(delBtn);
                }

                // 点击打开灯箱
                mediaWrapper.onclick = () => openLightbox(globalIndex);

                // 覆盖层
                if (photo.description || photo.date) {
                    const overlay = document.createElement('div');
                    overlay.className = 'overlay';
                    if (photo.description) {
                        const caption = document.createElement('div');
                        caption.className = 'caption';
                        caption.textContent = photo.description;
                        overlay.appendChild(caption);
                    }
                    if (photo.date) {
                        const date = document.createElement('div');
                        date.className = 'date';
                        date.textContent = photo.date;
                        overlay.appendChild(date);
                    }
                    item.appendChild(overlay);
                }

                fragment.appendChild(item);

                // 观察懒加载
                lazyObserver.observe(mediaWrapper);
            });

            gallery.appendChild(fragment);
            displayedCount = end;

            // 显示/隐藏加载更多按钮
            if (displayedCount < filteredPhotos.length) {
                loadMoreContainer.style.display = 'block';
                loadMoreBtn.textContent = `加载更多 (${displayedCount}/${filteredPhotos.length})`;
                loadMoreBtn.disabled = false;
            } else {
                loadMoreContainer.style.display = 'none';
            }
        }

        // 加载更多
        function loadMore() {
            if (displayedCount >= filteredPhotos.length) return;
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            loadMoreBtn.disabled = true;
            loadMoreBtn.textContent = '加载中...';
            // 用 requestAnimationFrame 分批渲染，避免卡顿
            requestAnimationFrame(() => {
                renderBatch();
            });
        }

        // 渲染相册选择器
        function renderAlbumSelector() {
            const selector = document.getElementById('albumSelector');
            selector.innerHTML = `
                <button class="album-btn ${currentAlbum === 'all' ? 'active' : ''}" data-album="all">
                    全部 (${allPhotos.length})
                </button>
                ${allAlbums.map(album => `
                    <span class="album-btn-wrap">
                        <button class="album-btn ${currentAlbum === album.name ? 'active' : ''}" data-album="${album.name}">
                            ${album.name} (${album.photoCount})
                        </button>
                        ${isAdminMode ? `<button class="album-delete-btn" data-album="${album.name}" title="删除相册">×</button>` : ''}
                    </span>
                `).join('')}
            `;

            selector.querySelectorAll('.album-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentAlbum = e.target.dataset.album;
                    renderAlbumSelector();
                    resetAndRender();
                });
            });

            // 删除相册按钮事件（管理模式）
            selector.querySelectorAll('.album-delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const albumName = e.target.dataset.album;
                    const ok = await showConfirm(`确定删除相册"${albumName}"吗？\n其中的所有照片/视频也会被删除！`);
                    if (!ok) return;
                    try {
                        const res = await fetch(`/api/admin/albums/${encodeURIComponent(albumName)}`, { method: 'DELETE' });
                        const result = await res.json();
                        if (result.message) {
                            showToast('相册已删除', 'success');
                            if (currentAlbum === albumName) currentAlbum = 'all';
                            loadData();
                        } else {
                            showToast('删除失败', 'error');
                        }
                    } catch (err) {
                        showToast('删除失败：' + err, 'error');
                    }
                });
            });
        }

        // 切换管理模式
        function toggleAdminMode() {
            isAdminMode = !isAdminMode;
            const btn = document.getElementById('modeToggle');
            const panel = document.getElementById('adminPanel');

            if (isAdminMode) {
                btn.classList.add('active');
                btn.innerHTML = '👁️ 展示';
                panel.classList.add('active');
                panel.classList.remove('collapsed');
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '🔧 管理';
                panel.classList.remove('active');
                panel.classList.remove('collapsed');
            }

            resetAndRender();
        }

        // 折叠/展开管理面板
        function toggleAdminCollapse(event) {
            event.stopPropagation();
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('collapsed');
            const btn = panel.querySelector('.admin-collapse-btn');
            if (panel.classList.contains('collapsed')) {
                btn.innerHTML = '🔧';
                btn.title = '展开管理面板';
                // 点击折叠的面板展开它
                panel.onclick = function(e) {
                    if (panel.classList.contains('collapsed')) {
                        e.stopPropagation();
                        panel.classList.remove('collapsed');
                        btn.innerHTML = '✕';
                        btn.title = '收起管理面板';
                        panel.onclick = null;
                    }
                };
            } else {
                btn.innerHTML = '✕';
                btn.title = '收起管理面板';
                panel.onclick = null;
            }
        }

        // 创建相册
        async function createAlbum() {
            const name = document.getElementById('newAlbumName').value;
            const description = document.getElementById('newAlbumDesc').value;

            if (!name) { showToast('请输入相册名称'); return; }

            try {
                const res = await fetch('/api/admin/albums', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description })
                });

                if (res.ok) {
                    showToast('相册创建成功', 'success');
                    document.getElementById('newAlbumName').value = '';
                    document.getElementById('newAlbumDesc').value = '';
                    loadData();
                } else {
                    showToast('创建失败: ' + await res.text(), 'error');
                }
            } catch (error) {
                showToast('创建失败: ' + error.message, 'error');
            }
        }

        // 编辑照片
        function editPhoto(album, photoId) {
            const photo = allPhotos.find(p => p.id === photoId);
            if (!photo) return;

            editingPhoto = { album, photoId };
            document.getElementById('editDescription').value = photo.description || '';
            document.getElementById('editTags').value = (photo.tags || []).join(', ');
            document.getElementById('editModal').classList.add('active');
        }

        // 保存编辑
        async function savePhotoEdit() {
            if (!editingPhoto) return;

            const description = document.getElementById('editDescription').value;
            const tags = document.getElementById('editTags').value.split(',').map(t => t.trim()).filter(t => t);

            try {
                const res = await fetch(`/api/admin/photos/${encodeURIComponent(editingPhoto.album)}/${editingPhoto.photoId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description, tags })
                });

                if (res.ok) {
                    showToast('保存成功', 'success');
                    closeEditModal();
                    loadData();
                } else {
                    showToast('保存失败', 'error');
                }
            } catch (error) {
                showToast('保存失败: ' + error.message, 'error');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingPhoto = null;
        }

        // 删除照片
        async function deletePhoto(album, photoId) {
            const ok = await showConfirm('确定要删除这张照片吗？');
            if (!ok) return;

            try {
                if (window.pywebview && window.pywebview.api) {
                    const result = await window.pywebview.api.delete_photo(album, photoId);
                    if (result.success) {
                        showToast('删除成功', 'success');
                        loadData();
                    } else {
                        showToast('删除失败: ' + result.error, 'error');
                    }
                }
            } catch (error) {
                showToast('删除失败: ' + error, 'error');
            }
        }

        // 更新上传相册选择
        function updateUploadAlbumSelect() {
            const select = document.getElementById('uploadAlbum');
            select.innerHTML = allAlbums.map(album => `<option value="${album.name}">${album.name}</option>`).join('');
        }

        // 应用名称到页面
        function applyAppName(name) {
            // 更新 header logo 名字部分（💕 固定不动）
            document.getElementById('logoName').textContent = name;
            // 更新页面标题
            document.title = '💕 ' + name;
            // 更新管理面板的输入框
            document.getElementById('appNameInput').value = name;
        }

        // 改名
        async function renameApp() {
            const newName = document.getElementById('appNameInput').value.trim();
            if (!newName) { showToast('名称不能为空'); return; }

            try {
                const res = await fetch('/api/admin/rename', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName })
                });

                if (res.ok) {
                    // 通过 pywebview JS API 自动重启
                    if (window.pywebview && window.pywebview.api) {
                        try {
                            await window.pywebview.api.restart_app();
                        } catch (e) {
                            // 重启失败则手动刷新
                            location.reload();
                        }
                    } else {
                        location.reload();
                    }
                } else {
                    showToast('改名失败', 'error');
                }
            } catch (error) {
                showToast('改名失败: ' + error.message, 'error');
            }
        }

        // 灯箱功能
        function openLightbox(index) {
            currentLightboxIndex = index;
            const photo = filteredPhotos[index];
            if (!photo) return;

            const content = document.getElementById('lightboxContent');
            let srcPath = photo.path;
            if (!srcPath.startsWith('/')) srcPath = '/' + srcPath;
            const encodedSrc = encodeURI(srcPath);

            content.innerHTML = photo.type === 'video'
                ? `<video src="${encodedSrc}" controls autoplay></video>`
                : `<img src="${encodedSrc}" alt="">`;

            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            // 关闭灯箱时清理视频
            const content = document.getElementById('lightboxContent');
            content.innerHTML = '';
        }

        function navigateLightbox(direction) {
            currentLightboxIndex += direction;
            if (currentLightboxIndex < 0) currentLightboxIndex = filteredPhotos.length - 1;
            if (currentLightboxIndex >= filteredPhotos.length) currentLightboxIndex = 0;
            openLightbox(currentLightboxIndex);
        }

        // ===== 收藏夹功能 =====

        // 渲染收藏夹标签页
        function renderCollectionTabs() {
            const tabs = document.getElementById('collectionTabs');
            if (!tabs) return;
            if (allCollections.length === 0) {
                tabs.innerHTML = '<span style="color:#999;font-size:14px;">还没有收藏夹，点击右上角“管理”创建</span>';
                return;
            }
            const totalFav = new Set();
            allCollections.forEach(col => col.photoIds.forEach(item => totalFav.add(`${item.album}|||${item.photoId}`)));
            let html = `<button class="collection-tab ${!currentCollection ? 'active' : ''}" onclick="selectCollection(null)">全部收藏 (${totalFav.size})</button>`;
            allCollections.forEach(col => {
                const count = col.photoIds.length;
                const isActive = currentCollection === col.id ? ' active' : '';
                html += `<button class="collection-tab${isActive}" onclick="selectCollection('${col.id}')">${col.name} (${count})</button>`;
            });
            tabs.innerHTML = html;
        }

        function selectCollection(collectionId) {
            currentCollection = collectionId;
            renderCollectionTabs();
            resetAndRender();
        }

        // 打开加入收藏夹弹窗
        function openCollectionPicker(event, photo) {
            event.stopPropagation();
            event.preventDefault();
            pickerPhoto = photo;
            const wrap = document.getElementById('collectionPickerWrap');
            const picker = document.getElementById('collectionPicker');
            const btn = event.currentTarget;
            const rect = btn.getBoundingClientRect();
            wrap.style.display = 'block';
            wrap.style.top = (rect.bottom + 5) + 'px';
            wrap.style.left = Math.max(10, rect.right - 220) + 'px';
            let html = '<div class="collection-picker-title">加入收藏夹</div>';
            if (allCollections.length === 0) {
                html += '<div style="padding:10px;color:#999;font-size:13px;text-align:center;">还没有收藏夹<br>点击下方新建一个</div>';
            } else {
                allCollections.forEach(col => {
                    const inCol = (photo.collections || []).some(c => c.id === col.id);
                    const check = inCol ? '❤️' : '🤍';
                    html += `<div class="collection-picker-item" onclick="event.stopPropagation(); togglePhotoInCollection('${col.id}')"><span class="cp-check">${check}</span><span>${col.name}</span></div>`;
                });
            }
            html += '<div class="collection-picker-divider"></div>';
            html += '<div class="collection-picker-new" onclick="event.stopPropagation(); createCollectionForPhoto()">➕ 新建收藏夹</div>';
            picker.innerHTML = html;
        }

        function closeCollectionPicker() {
            document.getElementById('collectionPickerWrap').style.display = 'none';
            pickerPhoto = null;
        }

        // 点击弹窗外部时关闭（用 capture 阶段，确保在所有其他 click 处理前执行）
        document.addEventListener('click', function(e) {
            const wrap = document.getElementById('collectionPickerWrap');
            if (wrap.style.display === 'block' && !wrap.contains(e.target)) {
                closeCollectionPicker();
            }
        }, true);

        function createCollectionForPhoto() {
            const name = prompt('输入新收藏夹名称：');
            if (!name) return;
            fetch('/api/admin/collections', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            }).then(res => res.json()).then(result => {
                if (result.id) {
                    showToast(`收藏夹"${name}"已创建，请重新点击 ➕ 把照片加入`, 'success');
                    closeCollectionPicker();
                    loadData();
                } else {
                    showToast('创建失败：' + (result.error || '未知错误'), 'error');
                }
            });
        }

        // 切换照片在某个收藏夹中的状态（从弹窗内点击触发）
        async function togglePhotoInCollection(collectionId) {
            if (!pickerPhoto) return;
            const photo = pickerPhoto;
            const inCol = (photo.collections || []).some(c => c.id === collectionId);
            try {
                if (inCol) {
                    await fetch(`/api/admin/collections/${collectionId}/photos/${encodeURIComponent(photo.album)}/${photo.id}`, { method: 'DELETE' });
                } else {
                    await fetch(`/api/admin/collections/${collectionId}/photos`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ album: photo.album, photoId: photo.id })
                    });
                }
                await loadData();
                closeCollectionPicker();
            } catch (err) {
                showToast('操作失败：' + err, 'error');
            }
        }

        // 点击收藏按钮：已在收藏夹 → 全部移除；不在 → 打开选择弹窗
        async function onCollectionBtnClick(event, photo) {
            event.stopPropagation();
            event.preventDefault();
            const inAny = (photo.collections || []).length > 0;
            if (inAny) {
                const names = photo.collections.map(c => c.name).join('、');
                const ok = await showConfirm(`这张照片已在以下收藏夹中：\n${names}\n\n确定要取消收藏吗？`);
                if (!ok) return;
                try {
                    await fetch(`/api/admin/photos/${encodeURIComponent(photo.album)}/${photo.id}/unfavorite`, { method: 'POST' });
                    showToast('已取消收藏', 'success');
                    await loadData();
                } catch (err) {
                    showToast('操作失败：' + err, 'error');
                }
            } else {
                openCollectionPicker(event, photo);
            }
        }

        // 收藏夹管理弹窗
        function openManageCollections() {
            document.getElementById('manageModal').classList.add('active');
            renderManageList();
        }

        function closeManageCollections() {
            document.getElementById('manageModal').classList.remove('active');
        }

        function renderManageList() {
            const list = document.getElementById('manageList');
            if (allCollections.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">还没有收藏夹</div>';
                return;
            }
            list.innerHTML = allCollections.map(col => `
                <div class="manage-item">
                    <span class="manage-item-name">${col.name}</span>
                    <span class="manage-item-count">${col.photoIds.length} 个</span>
                    <div class="manage-item-btns">
                        <button data-id="${col.id}" data-name="${col.name.replace(/"/g, '&quot;')}" onclick="renameCollectionInManage(this.dataset.id, this.dataset.name)" title="重命名">✏️</button>
                        <button data-id="${col.id}" data-name="${col.name.replace(/"/g, '&quot;')}" onclick="deleteCollectionInManage(this.dataset.id, this.dataset.name)" title="删除">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        async function createCollectionFromManage() {
            const input = document.getElementById('newCollectionName');
            const name = input.value.trim();
            if (!name) { showToast('请输入收藏夹名称'); return; }
            try {
                const res = await fetch('/api/admin/collections', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const result = await res.json();
                if (result.id) {
                    showToast(`收藏夹"${name}"已创建`, 'success');
                    input.value = '';
                    await loadData();
                    renderManageList();
                    renderCollectionTabs();
                } else {
                    showToast('创建失败：' + (result.error || '未知错误'), 'error');
                }
            } catch (err) {
                showToast('创建失败：' + err, 'error');
            }
        }

        async function renameCollectionInManage(collectionId, oldName) {
            const newName = prompt('重命名收藏夹：', oldName);
            if (!newName || newName === oldName) return;
            try {
                const res = await fetch(`/api/admin/collections/${collectionId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName })
                });
                const result = await res.json();
                if (result.success) {
                    showToast('重命名成功', 'success');
                    await loadData();
                    renderManageList();
                    renderCollectionTabs();
                } else {
                    showToast('重命名失败', 'error');
                }
            } catch (err) {
                showToast('重命名失败：' + err, 'error');
            }
        }

        async function deleteCollectionInManage(collectionId, name) {
            const ok = await showConfirm(`确定删除收藏夹"${name}"吗？\n（收藏夹中的照片不会被删除）`);
            if (!ok) return;
            try {
                const res = await fetch(`/api/admin/collections/${collectionId}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    showToast('收藏夹已删除', 'success');
                    await loadData();
                    renderManageList();
                    renderCollectionTabs();
                    if (currentCollection === collectionId) {
                        currentCollection = null;
                    }
                    resetAndRender();
                } else {
                    showToast('删除失败', 'error');
                }
            } catch (err) {
                showToast('删除失败：' + err, 'error');
            }
        }

        // ===== 程序更新 =====
        async function checkForUpdate() {
            showToast('正在检查更新...', 'info');
            try {
                const res = await fetch('/api/admin/update/check');
                const data = await res.json();
                if (data.error) {
                    showToast('检查失败：' + data.error, 'error');
                    return;
                }
                if (!data.hasUpdate) {
                    showToast(`当前已是最新版本 (v${data.currentVersion})`, 'success');
                    return;
                }
                const info = document.getElementById('updateInfo');
                const desc = document.getElementById('updateDesc');
                info.innerHTML = `<div>当前版本：<span class="version-old">v${data.currentVersion}</span></div><div>最新版本：<span class="version-new">v${data.newVersion}</span></div>`;
                if (data.description) {
                    desc.style.display = 'block';
                    desc.textContent = data.description;
                } else {
                    desc.style.display = 'none';
                }
                document.getElementById('updateModal').classList.add('active');
            } catch (err) {
                showToast('检查失败：' + err, 'error');
            }
        }

        async function applyUpdate() {
            const btn = document.getElementById('updateApplyBtn');
            btn.disabled = true;
            btn.textContent = '正在更新...';
            showToast('正在应用更新，请稍候...', 'info');
            try {
                const res = await fetch('/api/admin/update/apply', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message || '更新成功，程序即将重启', 'success');
                    btn.textContent = '更新成功';
                } else {
                    showToast('更新失败：' + data.error, 'error');
                    btn.disabled = false;
                    btn.textContent = '立即更新';
                }
            } catch (err) {
                showToast('更新失败：' + err, 'error');
                btn.disabled = false;
                btn.textContent = '立即更新';
            }
        }

        function closeUpdateModal() {
            document.getElementById('updateModal').classList.remove('active');
            document.getElementById('updateApplyBtn').disabled = false;
            document.getElementById('updateApplyBtn').textContent = '立即更新';
        }

        // ===== 音乐播放器 =====
        function setupMusicEvents() {
            const audio = document.getElementById('audioPlayer');

            // 播放进度更新
            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    const pct = (audio.currentTime / audio.duration) * 100;
                    document.getElementById('musicProgressFill').style.width = pct + '%';
                    document.getElementById('musicCurrentTime').textContent = formatTime(audio.currentTime);
                    document.getElementById('musicDuration').textContent = formatTime(audio.duration);
                }
            });

            // 播放结束
            audio.addEventListener('ended', () => {
                if (musicLoopMode === 'single') {
                    audio.currentTime = 0;
                    audio.play();
                } else if (musicLoopMode === 'sequence') {
                    if (currentMusicIndex < musicFiles.length - 1) {
                        currentMusicIndex++;
                        playCurrentTrack();
                    } else {
                        // 放完最后一首回到第一首
                        currentMusicIndex = 0;
                        playCurrentTrack();
                    }
                } else if (musicLoopMode === 'shuffle') {
                    currentMusicIndex = Math.floor(Math.random() * musicFiles.length);
                    playCurrentTrack();
                }
            });

            // 音量变化
            audio.addEventListener('volumechange', () => {
                document.getElementById('musicVolumeFill').style.width = (audio.volume * 100) + '%';
                const icon = document.querySelector('.music-volume-icon');
                if (audio.muted || audio.volume === 0) icon.textContent = '🔇';
                else if (audio.volume < 0.5) icon.textContent = '🔉';
                else icon.textContent = '🔊';
            });

            audio.volume = 0.8;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function expandMusicPlayer() {
            document.getElementById('musicPlayer').classList.add('expanded');
            renderMusicPlaylist();
        }

        function collapseMusicPlayer() {
            document.getElementById('musicPlayer').classList.remove('expanded');
        }

        function toggleMusic() {
            const audio = document.getElementById('audioPlayer');
            const btn = document.getElementById('musicPlayBtn');

            if (musicFiles.length === 0) { showToast('请先在管理面板上传音乐'); return; }

            if (audio.paused) {
                if (!audio.src) {
                    audio.src = getMusicPath(musicFiles[currentMusicIndex]);
                }
                audio.play();
                isMusicPlaying = true;
                btn.textContent = '⏸️';
                document.getElementById('musicCollapsed').textContent = '⏸️';
            } else {
                audio.pause();
                isMusicPlaying = false;
                btn.textContent = '🎵';
                document.getElementById('musicCollapsed').textContent = '🎵';
            }
            updateMusicInfo();
        }

        function playCurrentTrack() {
            const audio = document.getElementById('audioPlayer');
            if (musicFiles.length === 0) return;
            audio.src = getMusicPath(musicFiles[currentMusicIndex]);
            audio.play();
            isMusicPlaying = true;
            document.getElementById('musicPlayBtn').textContent = '⏸️';
            document.getElementById('musicCollapsed').textContent = '⏸️';
            updateMusicInfo();
            renderMusicPlaylist();
        }

        function prevMusic() {
            if (musicFiles.length === 0) return;
            currentMusicIndex = (currentMusicIndex - 1 + musicFiles.length) % musicFiles.length;
            playCurrentTrack();
        }

        function nextMusic() {
            if (musicFiles.length === 0) return;
            if (musicLoopMode === 'shuffle') {
                currentMusicIndex = Math.floor(Math.random() * musicFiles.length);
            } else {
                currentMusicIndex = (currentMusicIndex + 1) % musicFiles.length;
            }
            playCurrentTrack();
        }

        function playMusicAt(index) {
            currentMusicIndex = index;
            playCurrentTrack();
        }

        function seekMusic(event) {
            const audio = document.getElementById('audioPlayer');
            if (!audio.duration) return;
            const bar = document.getElementById('musicProgressBar');
            const rect = bar.getBoundingClientRect();
            const pct = (event.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        }

        function setVolume(event) {
            const audio = document.getElementById('audioPlayer');
            const bar = document.getElementById('musicVolumeBar');
            const rect = bar.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
            audio.volume = pct;
            audio.muted = false;
        }

        function toggleMute() {
            const audio = document.getElementById('audioPlayer');
            audio.muted = !audio.muted;
        }

        function toggleMusicLoopMode() {
            const modes = ['sequence', 'shuffle', 'single'];
            const icons = ['🔁', '🔀', '🔂'];
            const labels = ['顺序播放', '随机播放', '单曲循环'];
            const idx = modes.indexOf(musicLoopMode);
            const nextIdx = (idx + 1) % modes.length;
            musicLoopMode = modes[nextIdx];
            const btn = document.getElementById('loopModeBtn');
            btn.textContent = icons[nextIdx];
            btn.title = labels[nextIdx];
            // 设置audio的loop属性
            const audio = document.getElementById('audioPlayer');
            audio.loop = (musicLoopMode === 'single');
        }

        function updateMusicInfo() {
            if (musicFiles.length > 0) {
                const music = musicFiles[currentMusicIndex];
                document.getElementById('musicSongName').textContent = music.name || music.filename || '未知音乐';
                document.getElementById('musicSongIndex').textContent =
                    (currentMusicIndex + 1) + ' / ' + musicFiles.length;
            }
        }

        function renderMusicPlaylist() {
            const container = document.getElementById('musicPlaylist');
            if (musicFiles.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#999;font-size:13px;">暂无音乐<br><span style="font-size:11px;">请在管理面板上传</span></div>';
                return;
            }

            container.innerHTML = musicFiles.map((music, i) => {
                const name = music.name || music.filename || '未知';
                const isActive = i === currentMusicIndex ? ' active' : '';
                return `<div class="music-playlist-item${isActive}" onclick="playMusicAt(${i})">
                    <span class="song-num">${i === currentMusicIndex && isMusicPlaying ? '▶' : (i + 1)}</span>
                    <span class="song-name">${name}</span>
                    <button class="song-delete" onclick="deleteMusic(event, ${i})" title="删除">✕</button>
                </div>`;
            }).join('');
        }

        function getMusicPath(music) {
            let path = music.path || music.filename || '';
            if (path && !path.startsWith('/')) path = '/' + path;
            return encodeURI(path);
        }

        async function deleteMusic(event, index) {
            event.stopPropagation();
            const music = musicFiles[index];
            const name = music.name || music.filename || '未知';

            const ok = await showConfirm('确定删除 "' + name + '" 吗？');
            if (!ok) return;

            const wasPlayingCurrent = (index === currentMusicIndex && isMusicPlaying);

            try {
                if (window.pywebview && window.pywebview.api) {
                    const musicId = music.id || music.filename;
                    const result = await window.pywebview.api.delete_music(musicId);
                    if (result.success) {
                        musicFiles.splice(index, 1);
                        allMusic = musicFiles;

                        if (musicFiles.length === 0) {
                            const audio = document.getElementById('audioPlayer');
                            audio.pause();
                            audio.src = '';
                            isMusicPlaying = false;
                            currentMusicIndex = 0;
                            document.getElementById('musicPlayBtn').textContent = '🎵';
                            document.getElementById('musicCollapsed').textContent = '🎵';
                            document.getElementById('musicSongName').textContent = '暂无音乐';
                            document.getElementById('musicSongIndex').textContent = '';
                        } else if (wasPlayingCurrent) {
                            if (currentMusicIndex >= musicFiles.length) {
                                currentMusicIndex = 0;
                            }
                            playCurrentTrack();
                        } else {
                            if (index < currentMusicIndex) {
                                currentMusicIndex--;
                            } else if (currentMusicIndex >= musicFiles.length) {
                                currentMusicIndex = 0;
                            }
                            updateMusicInfo();
                        }
                        renderMusicPlaylist();
                    } else {
                        showToast('删除失败: ' + result.error, 'error');
                    }
                }
            } catch (error) {
                console.error('删除音乐失败:', error);
                showToast('删除失败: ' + error, 'error');
            }
        }
    </script>
    <div class="version-badge" id="versionBadge">v1.1.0</div>
</body>
